<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Todd's Tactical</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#0a0a0a;color:#f0f0f0;min-height:100vh}.h{background:#111;border-bottom:1px solid #2a2a2a;padding:1rem 2rem;display:flex;justify-content:space-between}.h h1{font-size:1.2rem;text-transform:uppercase;letter-spacing:.1em}.h span{color:#e8a020;font-size:.8rem}.c{max-width:900px;margin:2rem auto;padding:0 1rem}.s{display:flex;gap:.5rem;margin-bottom:2rem}.s input{flex:1;padding:.8rem;background:#1a1a1a;border:1px solid #333;color:#fff;font-size:1rem;border-radius:4px}.s button{padding:.8rem 1.5rem;background:#e8a020;color:#000;border:none;font-weight:700;cursor:pointer;border-radius:4px;text-transform:uppercase}.p{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:1.5rem;margin-bottom:1rem;display:grid;grid-template-columns:1fr 1fr;gap:1rem}.p:hover{border-color:#e8a020}.lb{color:#888;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em}.v{font-size:1.3rem;font-weight:700}.pr{color:#e8a020}.gs{color:#4a8}.rs{color:#c22}.sk{color:#888;font-family:monospace;grid-column:1/-1}.info{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:1.5rem;margin-bottom:2rem;color:#888;font-size:.9rem;line-height:1.6}.info b{color:#e8a020}</style></head><body><div class="h"><h1>Todd's Tactical</h1><span>Live Kroll Inventory</span></div><div class="c"><div class="info">Enter up to <b>10 Kroll SKUs</b> separated by commas.<br>Examples: <b>75104</b>, <b>1306443001SM</b>, <b>190-01B</b>, <b>5564-3</b></div><div class="s"><input type="text" id="q" placeholder="Enter SKUs (e.g. 75104, 1306443001SM)"><button onclick="go()">Check Stock</button></div><div id="r"></div></div><script>var sec=localStorage.getItem('ks')||'';if(!sec){sec=prompt('Enter API secret:')||'';if(sec)localStorage.setItem('ks',sec);}async function go(){var q=document.getElementById('q').value.trim();if(!q)return;var r=document.getElementById('r');r.innerHTML='<div style="text-align:center;color:#888;padding:2rem">Checking Kroll...</div>';try{var res=await fetch('/api/check-sku?secret='+encodeURIComponent(sec)+'&skus='+encodeURIComponent(q));var d=await res.json();if(d.error){r.innerHTML='<div style="color:#c22;padding:2rem">'+d.error+'</div>';return;}if(!d.results||!d.results.length){r.innerHTML='<div style="color:#888;padding:2rem">No results</div>';return;}r.innerHTML=d.results.map(function(i){if(!i.found)return'<div class="p"><div class="sk">'+i.sku+'</div><div style="color:#c22;grid-column:1/-1">Not found</div></div>';return'<div class="p"><div class="sk">'+i.sku+'</div><div><div class="lb">Dealer Cost</div><div class="v">$'+i.dealerCost.toFixed(2)+'</div></div><div><div class="lb">MSRP</div><div class="v">$'+i.msrp.toFixed(2)+'</div></div><div><div class="lb">Your Price ('+d.markup+')</div><div class="v pr">$'+i.sellPrice.toFixed(2)+'</div></div><div><div class="lb">Stock</div><div class="v '+(i.qty>0?'gs':'rs')+'">'+(i.qty>0?i.qty+' available':'Out of stock')+'</div></div></div>';}).join('');}catch(e){r.innerHTML='<div style="color:#c22">Error: '+e.message+'</div>';}}document.getElementById('q').onkeydown=function(e){if(e.key==='Enter')go();};</script></body></html>
